global
    log stdout format raw local0
    maxconn 2048

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 30s
    timeout server 30s

resolvers docker
    nameserver dns 127.0.0.11:53
    hold valid 10s

frontend fe_http
    bind *:80

    acl is_lb_health path -i /healthz/lb
    acl is_api path_beg /api

    http-request return status 200 content-type text/plain string ok if is_lb_health

    use_backend bk_api if is_api
    default_backend bk_frontend

backend bk_frontend
    server front frontend:80 check

backend bk_api
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    http-response add-header X-Backend-Server %[srv_name]
    server-template api 1-3 backend:3000 check resolvers docker init-addr libc,none

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
